name: LIBS Literature Digest

on:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate and send digest
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          DIGEST_FROM_NAME: "LIBS Literature Digest"
          LOOKBACK_DAYS: "90"
          DIGEST_LIMIT: "5"
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          python cloud_literature_digest/literature_digest.py --send --output digest.md

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libs-literature-digest
          path: digest.md
          if-no-files-found: ignore
